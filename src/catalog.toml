keywords = ["add", "master"]
layout = "master"

[[dispatch]]
dispatcher = "layoutmsg"
arg = "removemaster"
label = "Remove master"
keywords = ["remove", "master"]
layout = "master"

[[dispatch]]
dispatcher = "layoutmsg"
arg = "orientationnext"
label = "Next orientation"
keywords = ["orientation", "next", "rotate"]
layout = "master"

[[dispatch]]
dispatcher = "layoutmsg"
arg = "orientationprev"
